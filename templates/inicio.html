<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <!-- Header da pagina de estoque -->
                <!-- Texto estoque -->
<header>
  <h1>Estoque</h1>
  <ul class="header-actions">
    <li><input type="search" placeholder="Pesquisar..." class="search"></li>
    <li><a href="historico.html" class="botao__historico">Histórico</a></li>
  </ul>
</header>

       
<!-- Incio do main -->
    <main>
        <label for="container__retirada" style="color: black;"><h1>Escaneie algo</h1></label>
    <form class="container__retirada">
        
        
        <!-- Scanner de código de barras -->

        <label for="codigo_barra">Código de Barras</label>
        <input type="text" id="codigo_barra" placeholder="Escaneie o código de barras" autofocus required>

        <br>
        <!-- Quantidade de retirada -->

        <label for="quantidade">Quantidade</label>
        <input type="number" id="quantidade" placeholder="Ex: 5" required>
        <!-- Nome da pessoa que está retirando -->
        <br>
        <label for="nome_retirada">Quem está retirando?</label>
        <input type="text" id="nome_retirada" placeholder="Quem está retirando?" required>
        
        <br>
        <!-- Botão da retirada -->

        <button type="button" class="botao__retirada" onclick="retirar()">Retirar</button>
    </form>
    <br>

        <!-- Copyright pagina -->
    <footer style="color: black;">
        &copy; 2025 Guilherme Aguiar && Atena maker - Todos os direitos reservados.
    </footer>
        <!-- Aviso de retirada -->
        <div id="aviso" class="aviso">
  <div class="caixa">
    <span class="mensagem">Retirada registrada!</span>
  </div>
</div>

        <!-- Aviso de erro na retirada -->
<div id="aviso-erro" class="aviso">
  <div class="caixa">
    <span class="mensagem">Falha ao registrar!</span>
  </div>
</div>



</main>



<script src="../style/script/script.js"></script>


</body>

</html>
