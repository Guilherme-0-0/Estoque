<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  
  <link rel="stylesheet" href="style/login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Extra+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="texto_login"><h2>Login</h2></div>
    <form id="loginForm" class="login-form">
      <input type="text" id="username" placeholder="Nome" required>
      <input type="password" id="password" placeholder="Senha" required>
      <p class="error" id="errorMsg" style="display:none;">Usuário ou senha incorretos</p>
      <button class="submit_button" type="submit">Login</button>
    </form>
  </div>

  <!-- Link para o JS externo -->
  <script src="style/script/login.js"></script>
</body>
</html>
